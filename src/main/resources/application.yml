spring:
  application:
    name: kafka-practice

  datasource:
    url: jdbc:h2:mem:practice;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true        # http://localhost:8080/h2-console

  kafka:
    bootstrap-servers: localhost:9092,localhost:9094,localhost:9096

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        # 실습 가시화용 단축 (기본 2분 → 60초)
        delivery.timeout.ms: 60000
        request.timeout.ms: 5000
        retry.backoff.ms: 500

    consumer:
      group-id: order-processor
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "org.swm.kafkapractice.*"

    listener:
      ack-mode: manual_immediate
      concurrency: 3       # 토픽 파티션 수와 맞춤 (=병렬 컨슈머 스레드 수)

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
